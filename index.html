<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e2171f">
  <meta name="color-scheme" content="light dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My Store">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="IMG/favicon.png">
  <title>My Store</title>
  <link rel="icon" href="IMG/favicon.png" sizes="any" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #e2171f;
  --primary-dark: #e23232;
  --primary-light: #e0e7ff;
  --secondary: #ff7373;
  --accent: #1a1919;
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --text-secondary: #64748b;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
  --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.08), 0 8px 10px -6px rgba(0,0,0,0.03);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  height: 100%;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

a, button, input {
  -webkit-tap-highlight-color: transparent;
}

/* Accessible focus */
:focus-visible {
  outline: 3px solid rgba(226, 23, 31, 0.25);
  outline-offset: 2px;
  border-radius: 12px;
}

/* ===== NAVBAR ===== */
.main-nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(255, 255, 255, 0.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(226, 232, 240, 0.6);
}

.nav-container {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--primary);
  font-size: 1.35rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}

.nav-logo i {
  font-size: 1.5rem;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  justify-content: center;
}

.nav-link {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 16px;
  border-radius: var(--radius-sm);
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-weight: 500;
  transition: var(--transition);
  position: relative;
}

.nav-link:hover {
  color: var(--primary);
  background: var(--primary-light);
}

.nav-link.active {
  color: var(--primary);
  background: var(--primary-light);
  font-weight: 600;
}

.nav-badge {
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  margin-left: 2px;
}

.nav-profile {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.nav-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: default;
}

.nav-logout {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--bg);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  font-size: 14px;
}

.nav-logout:hover {
  background: #fee2e2;
  color: #ef4444;
}

.nav-mobile-toggle {
  display: none;
  background: none;
  border: none;
  font-size: 1.3rem;
  color: var(--text);
  cursor: pointer;
  padding: 8px;
  border-radius: 10px;
}

.nav-mobile-toggle:hover {
  background: var(--bg);
}

/* ===== HERO SECTION ===== */
.hero{
      position:relative;
      width:100%;
      height:70vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    /* VIDEO */
    .hero video{
      position:absolute;
      top:50%;
      left:50%;
      width:100%;
      height:100%;
      object-fit:fill;
      transform:translate(-50%,-50%);
      z-index:1;
    }

    /* DARK OVERLAY */
    .overlay{
      position:absolute;
      inset:0;
      background:
      linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0),
        rgba(0, 0, 0, 0),
        rgba(0, 0, 0, 0)
      );
      z-index:2;
    }

    /* CONTENT */
    .hero-content{
      position:relative;
      z-index:3;
      text-align:center;
      color:white;
      padding:20px;
      max-width:900px;
      animation:fadeUp 1s ease;
    }

    .hero-content h1{
      font-size:clamp(3rem,8vw,7rem);
      font-weight:800;
      line-height:1;
      letter-spacing:-3px;
      margin-bottom:20px;
      text-fill-color: transparent;
      text-stroke: 3px rgb(255, 255, 255);
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 3px rgb(255, 255, 255);
      -moz-text-fill-color: transparent;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero-content p{
      font-size:1.15rem;
      line-height:1.8;
      color:#ffffff;
      max-width:700px;
      margin:auto auto 35px;
    }

    /* BUTTON */
    .hero-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:16px 34px;
      border-radius:999px;
      background:white;
      color:black;
      text-decoration:none;
      font-weight:700;
      font-size:1rem;
      transition:.35s ease;
      box-shadow:0 10px 30px rgba(255,255,255,.2);
    }

    .hero-btn:hover{
      transform:translateY(-4px) scale(1.03);
      background:#d9d9d9;
      box-shadow:0 15px 40px rgba(255,255,255,.3);
    }

    /* FLOATING BLUR */
    .blur{
      position:absolute;
      width:400px;
      height:400px;
      border-radius:50%;
      background:rgba(20, 20, 20, 0.382);
      filter:blur(100px);
      z-index:2;
      animation:float 8s ease-in-out infinite;
    }

    .blur1{
      top:-100px;
      left:-100px;
    }

    .blur2{
      bottom:-100px;
      right:-100px;
      animation-delay:2s;
    }

    /* ANIMATIONS */
    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(50px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-30px);
      }
    }

    /* MOBILE */
    @media(max-width:768px){

      .hero-content h1{
        font-size:3.5rem;
        letter-spacing:-1px;
      }

      .hero-content p{
        font-size:1rem;
      }

      .hero-btn{
        padding:14px 28px;
      }
    }
/* IMAGE GRID */
.image-grid{
  position:absolute;
  inset:0;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  padding:18px;
  z-index:1;
  transform:scale(1.04);
  pointer-events:none;
}

.column{
  position:relative;
  overflow:hidden;
  height: 100%;
  border-radius:28px;
  align-self: stretch;
}

.column-track{
  display:flex;
  flex-direction:column;
  gap:18px;
  position:absolute;
  width:100%;
  top: 0;
}

.column img{
  width:100%;
  height: 420px;
  object-fit:cover;
  border-radius:28px;
  filter: brightness(.78) saturate(1.05);
  transition: transform .45s cubic-bezier(0.4, 0, 0.2, 1), filter .45s;
  box-shadow: 0 10px 30px rgba(0,0,0,.4);
  will-change: transform;
}

/* ANIMATIONS */
.scroll-up{ animation:scrollUp 22s linear infinite; }
.scroll-down{ animation:scrollDown 22s linear infinite; }

@keyframes scrollUp{ from{ transform:translateY(0);} to{ transform:translateY(-50%);} }
@keyframes scrollDown{ from{ transform:translateY(-50%);} to{ transform:translateY(0);} }

/* RESPONSIVE */
@media(max-width:900px){
  .image-grid{ grid-template-columns:repeat(2,1fr); }
  .hero p{ font-size: 1rem; }
}

@media(max-width:600px){
  .hero{ height: clamp(320px, 46vh, 430px); }
  .image-grid{
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:12px;
    transform:scale(1.0);
  }
  .column{ border-radius: 20px; }
  .column img{
    height: 300px;
    border-radius: 20px;
  }
  .hero-content{ padding: 18px 14px; }
  .hero h1{
    font-size: clamp(2.1rem, 7vw, 3.2rem);
    letter-spacing:-0.03em;
    margin-bottom: 14px;
  }
  .hero p{ font-size: 0.98rem; line-height: 1.6; }
}

@media (prefers-reduced-motion: reduce){
  .scroll-up, .scroll-down{ animation: none !important; }
  .column img{ transition: none !important; }
}

/* ===== SEARCH ===== */
.search-section {
  max-width: 520px;
  margin: -26px auto 40px;
  padding: 0 20px;
  position: relative;
  z-index: 2;
}

.search-wrapper {
  position: relative;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  transition: var(--transition);
}

.search-wrapper:focus-within {
  box-shadow: var(--shadow-xl), 0 0 0 4px var(--primary-light);
}

.search-wrapper i {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 18px;
  transition: var(--transition);
}

.search-wrapper:focus-within i {
  color: var(--primary);
}

#search-input {
  width: 100%;
  padding: 18px 20px 18px 52px;
  font-size: 16px;
  border: 2px solid transparent;
  border-radius: var(--radius);
  outline: none;
  background: transparent;
  color: var(--text);
  font-family: inherit;
  font-weight: 500;
}

#search-input::placeholder {
  color: var(--text-muted);
  font-weight: 400;
}

/* ===== SECTION HEADER ===== */
.section-header {
  max-width: 1300px;
  margin: 0 auto 28px;
  padding: 0 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.section-header h2 {
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--text);
  /* text-fill-color: transparent;
      text-stroke: 2px rgb(0, 0, 0);
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 2px rgb(0, 0, 0);
      -moz-text-fill-color: transparent;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent; */
}

.section-header span {
  font-size: 0.9rem;
  color: var(--text-secondary);
  font-weight: 500;
}

/* ===== FILTERS BAR ===== */
.filters-bar {
  max-width: 1300px;
  margin: 0 auto 20px;
  padding: 0 0px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.category-chips {
  display: flex;
  align-items: center;
  gap: 8px;
  overflow-x: auto;
  flex: 1;
  padding-bottom: 4px;
  scrollbar-width: none;
  justify-content: left;
}

.category-chips::-webkit-scrollbar {
  display: none;
}

.chip {
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 0.86rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  font-family: inherit;
  min-height: 40px;
}

.chip:hover {
  border-color: var(--primary-light);
  color: var(--primary);
  background: var(--primary-light);
}

.chip.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.sort-box {
  position: relative;
}

.sort-select {
  padding: 10px 36px 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  outline: none;
  appearance: none;
  font-family: inherit;
  transition: var(--transition);
}

.sort-select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

.sort-box::after {
  content: '\f078';
  font-family: 'Font Awesome 6 Free';
  font-weight: 900;
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 12px;
  pointer-events: none;
}

/* ===== PRODUCTS GRID ===== */
.products-wrapper {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

#products-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 24px;
}

/* ===== PRODUCT CARD ===== */
.product {
  background: var(--surface);
  overflow: hidden;
  /* box-shadow: var(--shadow); */
  transition: transform .28s cubic-bezier(0.4, 0, 0.2, 1), box-shadow .28s;
  border: 1px solid var(--border);
  position: relative;
  /* border-radius: 14px; */
}

.product:active {
  transform: translateY(1px);
}


/* .product:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-xl);
  border-color: var(--primary-light);
} */

.product-image-wrapper {
  position: relative;
  overflow: hidden;
  aspect-ratio: 1;
  background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
}

.product img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.product:hover img {
  transform: scale(1.06);
}

.product-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  box-shadow: 0 2px 8px rgba(245, 158, 11, 0.35);
}

.product-info {
  padding: 16px;
}

.product-info h3 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.product-price {
  font-size: 1rem;
  font-weight: 800;
  color: var(--primary);
  /* margin-bottom: 14px; */
  letter-spacing: -0.01em;
}

.product-price span {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-muted);
  text-decoration: line-through;
  margin-left: 8px;
}

.product-actions {
  display: flex;
  gap: 10px;
}

.btn {
  padding: 11px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: var(--transition);
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex: 1;
  display: none;
}

.btn-primary {
  background: var(--primary);
  color: #fff;
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-secondary {
  background: var(--bg);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--border);
  color: var(--text);
}

/* ===== SKELETON LOADING ===== */
.skeleton {
  background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius);
}

.skeleton-card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.skeleton-image {
  aspect-ratio: 1;
}

.skeleton-text {
  height: 16px;
  margin: 12px 18px;
  border-radius: 6px;
}

.skeleton-text.short {
  width: 40%;
}

.skeleton-buttons {
  display: flex;
  gap: 10px;
  padding: 0 18px 18px;
}

.skeleton-btn {
  flex: 1;
  height: 38px;
  border-radius: var(--radius-sm);
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ===== NO RESULTS ===== */
.no-results {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
  grid-column: 1 / -1;
}

.no-results i {
  font-size: 56px;
  margin-bottom: 16px;
  color: var(--border);
}

.no-results h3 {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.no-results p {
  font-size: 0.95rem;
}

/* ===== TOAST NOTIFICATION ===== */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--text);
  color: #fff;
  padding: 14px 22px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 500;
  box-shadow: var(--shadow-xl);
  display: flex;
  align-items: center;
  gap: 10px;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 9999;
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

.toast i {
  color: #4ade80;
  font-size: 18px;
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 0.85rem;
  border-top: 1px solid var(--border);
  margin-top: 20px;
}

/* ===== NAVBAR MOBILE ===== */
@media (max-width: 768px) {
  .nav-links {
    position: fixed;
    top: 64px;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(16px);
    flex-direction: column;
    align-items: stretch;
    padding: 12px 20px 20px;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    transform: translateY(-150%);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }

  .nav-links.open {
    transform: translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  .nav-link {
    padding: 12px 14px;
    border-radius: 10px;
    justify-content: flex-start;
  }

  .nav-mobile-toggle {
    display: none;
  }

  .nav-profile {
    gap: 8px;
  }
  
  .section-header h2 {
  font-size: 1.5rem;
  font-weight: 800;
  }
  
  
  
}

/* ===== RESPONSIVE ===== */
@media(max-width: 640px) {
  .hero h1 {
    font-size: 2rem;
  }
  .hero{
    height: clamp(320px, 42vh, 430px);
  }
  #products-container {
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  .product-info {
    padding: 14px;
  }

  .btn {
    padding: 11px 12px;
    font-size: 0.85rem;
    min-height: 44px;
    width: 100%;
  }

  .product-actions {
    flex-direction: column;
  }

  .product-price {
    font-size: 1.15rem;
  }
  
}



@media (max-width: 380px) {
  #products-container {
    grid-template-columns: 1fr;
  }
