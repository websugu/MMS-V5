<!DOCTYPE html>
<html lang="en">
<head>
      <link rel="icon" href="IMG/favicon.png" sizes="any">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Success</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #e2171f;
  --primary-dark: #4338ca;
  --primary-light: #e0e7ff;
  --secondary: #06b6d4;
  --accent: #1a1919;
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --text-secondary: #64748b;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
  --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.08), 0 8px 10px -6px rgba(0,0,0,0.03);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ===== NAVBAR ===== */
.main-nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(255, 255, 255, 0.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(226, 232, 240, 0.6);
}

.nav-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--primary);
  font-size: 1.35rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}

.nav-logo i {
  font-size: 1.5rem;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  justify-content: center;
}

.nav-link {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 16px;
  border-radius: var(--radius-sm);
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-weight: 500;
  transition: var(--transition);
}

.nav-link:hover {
  color: var(--primary);
  background: var(--primary-light);
}

.nav-link.active {
  color: var(--primary);
  background: var(--primary-light);
  font-weight: 600;
}

.nav-badge {
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  margin-left: 2px;
}

.nav-profile {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.nav-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: default;
}

.nav-logout {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--bg);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  font-size: 14px;
}

.nav-logout:hover {
  background: #fee2e2;
  color: #ef4444;
}

.nav-mobile-toggle {
  display: none;
  background: none;
  border: none;
  font-size: 1.3rem;
  color: var(--text);
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
}

.nav-mobile-toggle:hover {
  background: var(--bg);
}

/* ===== SUCCESS HERO ===== */
.success-hero {
  background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
  padding: 60px 20px 80px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.success-hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
  background-size: 24px 24px;
  opacity: 0.4;
}

.success-hero-content {
  position: relative;
  z-index: 1;
  max-width: 600px;
  margin: 0 auto;
}

.success-icon {
  width: 90px;
  height: 90px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 40px;
  color: #fff;
  backdrop-filter: blur(8px);
  border: 2px solid rgba(255,255,255,0.3);
  animation: scaleIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes scaleIn {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

.success-hero h1 {
  font-size: 2.2rem;
  font-weight: 800;
  color: #fff;
  margin-bottom: 10px;
  letter-spacing: -0.02em;
}

.success-hero p {
  font-size: 1.05rem;
  color: rgba(255,255,255,0.9);
}

/* ===== SUCCESS CARD ===== */
.success-wrapper {
  max-width: 640px;
  margin: -40px auto 60px;
  padding: 0 20px;
  position: relative;
  z-index: 2;
}

.success-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow-xl);
  border: 1px solid var(--border);
  animation: slideUp 0.5s 0.15s cubic-bezier(0.4, 0, 0.2, 1) both;
}

@keyframes slideUp {
  0% { transform: translateY(30px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

.success-card h2 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.success-card h2 i {
  color: var(--primary);
}

/* Order Info */
.order-info-grid {
  display: grid;
  gap: 14px;
}

.order-info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.order-info-row .label {
  font-size: 0.9rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.order-info-row .label i {
  color: var(--text-muted);
  font-size: 0.85rem;
}

.order-info-row .value {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
}

.order-info-row .value.status-pending {
  color: var(--accent);
}

.order-info-row .value.id {
  font-family: monospace;
  font-size: 0.85rem;
  background: var(--primary-light);
  color: var(--primary);
  padding: 4px 10px;
  border-radius: 6px;
}

/* ===== ACTION BUTTONS ===== */
.success-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 28px;
}

.btn {
  padding: 14px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: var(--transition);
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-decoration: none;
}

.btn-primary {
  background: var(--primary);
  color: #fff;
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(79, 70, 229, 0.35);
}

.btn-secondary {
  background: var(--bg);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--border);
  color: var(--text);
}

/* ===== SKELETON ===== */
.skeleton {
  background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ===== NAVBAR MOBILE ===== */
@media (max-width: 768px) {
  .nav-links {
    position: fixed;
    top: 64px;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(16px);
    flex-direction: column;
    align-items: stretch;
    padding: 12px 20px 20px;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    transform: translateY(-150%);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }

  .nav-links.open {
    transform: translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  .nav-link {
    padding: 12px 14px;
    border-radius: 10px;
    justify-content: flex-start;
  }

  .nav-mobile-toggle {
    display: none;
  }

  .nav-profile {
    gap: 8px;
  }

  .success-hero h1 {
    font-size: 1.7rem;
  }

  .success-actions {
    grid-template-columns: 1fr;
  }
}
</style>

<body>

<div id="navbar"></div>

<!-- Success Hero -->
<div class="success-hero">
  <div class="success-hero-content">
    <div class="success-icon">
      <i class="fas fa-check"></i>
    </div>
    <h1>Commande confirmée avec succès</h1>
    <p>Merci pour votre achat. Nous préparons votre commande.</p>
  </div>
</div>

<!-- Success Card -->
<div class="success-wrapper">
  <div class="success-card">
    <h2><i class="fas fa-receipt"></i> Détails de la commande</h2>
    <div class="order-info-grid" id="order-info">
      <div class="order-info-row">
        <span class="label"><i class="fas fa-hashtag"></i> ID de commande</span>
        <span class="value id skeleton" style="width: 120px; height: 22px;"></span>
      </div>
      <div class="order-info-row">
        <span class="label"><i class="fas fa-rupee-sign"></i> Montant total</span>
        <span class="value skeleton" style="width: 80px; height: 22px;"></span>
      </div>
      <div class="order-info-row">
        <span class="label"><i class="fas fa-info-circle"></i> Statut</span>
        <span class="value skeleton" style="width: 80px; height: 22px;"></span>
      </div>
    </div>

    <div class="success-actions">
      <a href="account.html" class="btn btn-secondary">
        <i class="fas fa-box"></i> Suivre la commande
      </a>
      <a href="index.html" class="btn btn-primary">
        <i class="fas fa-shopping-bag"></i> Continuer
      </a>
    </div>
    <div style="margin-top: 16px;">
      <a id="whatsapp-confirm-btn" href="#" target="_blank" class="btn" style="width: 100%; background: #25d366; color: #fff; display: none;">
        <i class="fab fa-whatsapp"></i> Confirmer sur WhatsApp
      </a>
    </div>
  </div>
</div>

<!-- Firebase + Scripts -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDuTtwVyvfidOwjzltlRUTOSYYaLtC_G1c",
    authDomain: "mmsp-b7835.firebaseapp.com",
    projectId: "mmsp-b7835",
    appId: "1:793727393765:web:8b9813288c6eaabb27590c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    const currentPage = window.location.pathname.split('/').pop();
    if (currentPage.startsWith('admin-') || currentPage === 'admin.html') return;

    if (!user) {
      window.location.href = "login.html";
    } else {
      import("./JS/navbar.js").then(nav => nav.renderNavbar());
      import("./JS/success.js");
    }
  });

  window.logout = function () {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
  };
</script>

</body>
</html>
