<!DOCTYPE html>
<html lang="en">
<head>
      <link rel="icon" href="IMG/favicon.png" sizes="any">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #e2171f;
  --primary-dark: #e23232;
  --primary-light: #e0e7ff;
  --secondary: #ff7373;
  --accent: #1a1919;
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --text-secondary: #64748b;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ===== NAVBAR ===== */
.main-nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(255, 255, 255, 0.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(226, 232, 240, 0.6);
}

.nav-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--primary);
  font-size: 1.35rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}

.nav-logo i {
  font-size: 1.5rem;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  justify-content: center;
}

.nav-link {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 16px;
  border-radius: var(--radius-sm);
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-weight: 500;
  transition: var(--transition);
}

.nav-link:hover {
  color: var(--primary);
  background: var(--primary-light);
}

.nav-link.active {
  color: var(--primary);
  background: var(--primary-light);
  font-weight: 600;
}

.nav-badge {
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  margin-left: 2px;
}

.nav-profile {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.nav-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: default;
}

.nav-logout {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--bg);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  font-size: 14px;
}

.nav-logout:hover {
  background: #fee2e2;
  color: #ef4444;
}

.nav-mobile-toggle {
  display: none;
  background: none;
  border: none;
  font-size: 1.3rem;
  color: var(--text);
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
}

.nav-mobile-toggle:hover {
  background: var(--bg);
}

/* ===== PAGE HEADER ===== */
.page-header {
  max-width: 1000px;
  margin: 0 auto;
  padding: 40px 20px 20px;
}

.page-header h1 {
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.page-header p {
  color: var(--text-secondary);
  font-size: 0.95rem;
  margin-top: 4px;
}

/* ===== CHECKOUT LAYOUT ===== */
.checkout-wrapper {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 20px 60px;
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 32px;
  align-items: start;
}

/* ===== FORM CARD ===== */
.form-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.section-title {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title i {
  color: var(--primary);
  font-size: 1.2rem;
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  padding: 12px 14px;
  font-size: 0.95rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  outline: none;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  transition: var(--transition);
}

.form-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

.form-group input:read-only {
  background: var(--bg);
  color: var(--text-muted);
  cursor: not-allowed;
}

/* ===== DETECT LOCATION BUTTON ===== */
.detect-location-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  margin-bottom: 10px;
  background: var(--primary-light);
  color: var(--primary);
  border: 1.5px solid var(--primary-light);
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}

.detect-location-btn:hover:not(:disabled) {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.detect-location-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.detect-location-btn i {
  font-size: 0.9rem;
}

.location-status {
  font-size: 0.8rem;
  margin-bottom: 10px;
  padding: 8px 12px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.location-status.success {
  background: #f0fdf4;
  color: #15803d;
  border: 1px solid #bbf7d0;
}

.location-status.error {
  background: #fef2f2;
  color: #b91c1c;
  border: 1px solid #fecaca;
}

.location-status.loading {
  background: #eff6ff;
  color: #1d4ed8;
  border: 1px solid #bfdbfe;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* ===== PAYMENT METHODS ===== */
.payment-methods {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.payment-option {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  background: var(--surface);
}

.payment-option:hover {
  border-color: var(--primary-light);
  background: #fafaff;
}

.payment-option input {
  width: 18px;
  height: 18px;
  accent-color: var(--primary);
  flex-shrink: 0;
}

.payment-option .payment-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}

.payment-option .payment-info {
  flex: 1;
}

.payment-option .payment-info strong {
  display: block;
  font-size: 0.95rem;
  color: var(--text);
}

.payment-option .payment-info span {
  font-size: 0.8rem;
  color: var(--text-muted);
}

.payment-option.selected {
  border-color: var(--primary);
  background: var(--primary-light);
  box-shadow: 0 0 0 3px var(--primary-light);
}

/* ===== ORDER SUMMARY ===== */
.order-summary-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  position: sticky;
  top: 84px;
}

.order-summary-card h2 {
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.summary-item {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.summary-item:last-of-type {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}

.summary-item img {
  width: 56px;
  height: 56px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
}

.summary-item-info {
  flex: 1;
  min-width: 0;
}

.summary-item-name {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.summary-item-variant {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

.summary-item-price {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--primary);
  margin-top: 4px;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  font-size: 0.95rem;
  color: var(--text-secondary);
}

.summary-row.total {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  padding-top: 14px;
  border-top: 1px solid var(--border);
  margin-top: 6px;
}

.summary-row.total span:last-child {
  color: var(--primary);
}

.place-order-btn {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: inherit;
}

.place-order-btn:hover:not(:disabled) {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(79, 70, 229, 0.35);
}

.place-order-btn:disabled {
  background: var(--text-muted);
  cursor: not-allowed;
  opacity: 0.7;
}

.secure-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 14px;
  font-size: 0.8rem;
  color: var(--text-muted);
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  grid-column: 1 / -1;
}

.empty-state i {
  font-size: 64px;
  color: var(--border);
  margin-bottom: 16px;
}

.empty-state h2 {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.empty-state p {
  color: var(--text-secondary);
  margin-bottom: 24px;
}

.empty-state a {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius-sm);
  text-decoration: none;
  font-weight: 600;
  transition: var(--transition);
}

.empty-state a:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
}

/* ===== SKELETON ===== */
.skeleton {
  background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius);
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--text);
  color: #fff;
  padding: 14px 22px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 10px;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 9999;
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

.toast i {
  color: #4ade80;
  font-size: 18px;
}

/* ===== NAVBAR MOBILE ===== */
@media (max-width: 768px) {
  .nav-links {
    position: fixed;
    top: 64px;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(16px);
    flex-direction: column;
    align-items: stretch;
    padding: 12px 20px 20px;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    transform: translateY(-150%);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }

  .nav-links.open {
    transform: translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  .nav-link {
    padding: 12px 14px;
    border-radius: 10px;
    justify-content: flex-start;
  }

  .nav-mobile-toggle {
    display: none;
  }

  .nav-profile {
    gap: 8px;
  }

  .checkout-wrapper {
    grid-template-columns: 1fr;
  }

  .order-summary-card {
    position: relative;
    top: 0;
  }

  .form-row {
    grid-template-columns: 1fr;
  }
}
</style>

<body>

<div id="navbar"></div>

<!-- Page Header -->
<div class="page-header">
  <h1>La caisse</h1>

<!-- Checkout Content -->

        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Auto-filled">
        </div>
      </div>
      <div class="form-group">
        <label for="address">Votre address</label>

        <input type="text" id="city" placeholder="Mali, Senegal ou ..." required>
      </div>

      <div class="section-title">

          <div class="payment-icon" style="background: #fff7ed; color: #f97316;">

          </div>
          <div class="payment-info">
            <strong>Orange Money</strong>
            <span>Payez avec votre portefeuille mobile.</span>

        </label>
        <label class="payment-option">
          <input type="radio" name="payment" value="wave" required>
          <div class="payment-icon" style="background: #ecfeff; color: #06b6d4;">

          <div class="payment-info">
            <strong>Wave</strong>
            <span>Paiement mobile rapide</span>
          </div>
        </label>

          <input type="radio" name="payment" value="card" required>
          <div class="payment-icon" style="background: #f0fdf4; color: #10b981;">
            <i class="fas fa-credit-card"></i>
          </div>
          <div class="payment-info">
            <strong>Credit / Debit Card</strong>
            <span>Pay securely with your card</span>
          </div>
        </label> -->
        <label class="payment-option">
          <input type="radio" name="payment" value="cash" required>
          <div class="payment-icon" style="background: #f8fafc; color: #64748b;">

          </div>
          <div class="payment-info">
            <strong>Paiement à la livraison</strong>
            <span>Payer après avoir reçu votre commande</span>
          </div>
        </label>
      </div>

  <!-- Order Summary -->
  <div id="order-summary"></div>
</div>

<!-- Toast -->
<div id="toast" class="toast">
  <i class="fas fa-check-circle"></i>
  <span id="toast-message">Updated</span>
</div>

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDuTtwVyvfidOwjzltlRUTOSYYaLtC_G1c",
    authDomain: "mmsp-b7835.firebaseapp.com",
    projectId: "mmsp-b7835",
    appId: "1:793727393765:web:8b9813288c6eaabb27590c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    const currentPage = window.location.pathname.split('/').pop();
    if (currentPage.startsWith('admin-') || currentPage === 'admin.html') return;

    import("./JS/navbar.js").then(nav => nav.renderNavbar());
    import("./JS/checkout.js");

  };
</script>
