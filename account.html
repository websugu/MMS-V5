<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account</title>
    <link rel="icon" href="IMG/favicon.png" sizes="any">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #e2171f;
  --primary-dark: #e23232;
  --primary-light: #e0e7ff;
  --secondary: #ff7373;
  --accent: #1a1919;
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --text-secondary: #64748b;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
  --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.08), 0 8px 10px -6px rgba(0,0,0,0.03);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ===== NAVBAR ===== */
.main-nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(255, 255, 255, 0.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(226, 232, 240, 0.6);
}

.nav-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--primary);
  font-size: 1.35rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}

.nav-logo i {
  font-size: 1.5rem;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  justify-content: center;
}

.nav-link {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 16px;
  border-radius: var(--radius-sm);
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-weight: 500;
  transition: var(--transition);
}

.nav-link:hover {
  color: var(--primary);
  background: var(--primary-light);
}

.nav-link.active {
  color: var(--primary);
  background: var(--primary-light);
  font-weight: 600;
}

.nav-badge {
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  margin-left: 2px;
}

.nav-profile {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.nav-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: default;
}

.nav-logout {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--bg);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  font-size: 14px;
}

.nav-logout:hover {
  background: #fee2e2;
  color: #ef4444;
}

.nav-mobile-toggle {
  display: none;
  background: none;
  border: none;
  font-size: 1.3rem;
  color: var(--text);
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
}

.nav-mobile-toggle:hover {
  background: var(--bg);
}

/* ===== PAGE HEADER ===== */
.page-header {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px 20px;
}

.page-header h1 {
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.page-header p {
  color: var(--text-secondary);
  font-size: 0.95rem;
  margin-top: 4px;
}

/* ===== MAIN LAYOUT ===== */
.main-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px 60px;
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 32px;
  align-items: start;
}

/* ===== PROFILE CARD ===== */
.profile-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  text-align: center;
  position: sticky;
  top: 84px;
}

.profile-avatar {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  font-weight: 800;
  margin: 0 auto 20px;
  box-shadow: 0 8px 24px rgba(79, 70, 229, 0.3);
}

.profile-name {
  font-size: 1.25rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.profile-email {
  font-size: 0.88rem;
  color: var(--text-secondary);
  margin-bottom: 24px;
}

.profile-info-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 24px;
}

.profile-info-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  font-size: 0.88rem;
  color: var(--text-secondary);
  text-align: left;
}

.profile-info-item i {
  color: var(--text-muted);
  font-size: 0.9rem;
  width: 18px;
  text-align: center;
}

.profile-info-item strong {
  color: var(--text);
  font-weight: 600;
  margin-left: auto;
}

.btn {
  padding: 12px;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: var(--transition);
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-primary {
  background: var(--primary);
  color: #fff;
  width: 100%;
}

.btn-primary:hover:not(:disabled) {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
}

.btn-secondary {
  background: var(--bg);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  width: 100%;
  margin-top: 10px;
}

.btn-secondary:hover {
  background: var(--border);
  color: var(--text);
}

/* ===== EDIT FORM ===== */
.edit-form {
  display: none;
  text-align: left;
  margin-bottom: 16px;
}

.edit-form.active {
  display: block;
  animation: fadeIn 0.3s ease;
}

.form-group {
  margin-bottom: 14px;
}

.form-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 5px;
}

.form-group input {
  width: 100%;
  padding: 10px 12px;
  font-size: 0.9rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  outline: none;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  transition: var(--transition);
}

.form-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

.form-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ===== ORDERS SECTION ===== */
.orders-section {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  max-width: 100%;
}

.orders-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.orders-header h2 {
  font-size: 1.15rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}

.orders-header h2 i {
  color: var(--primary);
}

.order-count {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-weight: 500;
}

/* Orders Table */
.orders-table-wrap {
  overflow-x: auto;
}

.orders-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}

.orders-table th {
  background: var(--bg);
  padding: 14px 16px;
  text-align: left;
  font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 2px solid var(--border);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  white-space: nowrap;
}

.orders-table td {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}

.orders-table tr:last-child td {
  border-bottom: none;
}

.orders-table tr:hover {
  background: #fafaff;
}

/* Product Cell */
.product-cell {
  display: flex;
  align-items: center;
  gap: 14px;
}

.product-cell img {
  width: 52px;
  height: 52px;
  border-radius: 10px;
  object-fit: cover;
  background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
  flex-shrink: 0;
}

.product-cell-info {
  min-width: 0;
}

.product-cell-name {
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 200px;
}

.product-cell-meta {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Status Badge */
.status-badge {
  display: inline-block;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  white-space: nowrap;
}

.status-pending { background: #fef3c7; color: #92400e; }
.status-processed { background: #e0e7ff; color: #3730a3; }
.status-shipped { background: #dbeafe; color: #1e40af; }
.status-delivered { background: #dcfce7; color: #166534; }
.status-cancelled { background: #fee2e2; color: #991b1b; }

/* Date */
.order-date {
  font-size: 0.88rem;
  color: var(--text-secondary);
  white-space: nowrap;
}

/* Action Buttons */
.action-cell {
  display: flex;
  gap: 8px;
  flex-wrap: nowrap;
}

.btn-action {
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: var(--transition);
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.btn-view {
  background: var(--primary-light);
  color: var(--primary);
}

.btn-view:hover {
  background: var(--primary);
  color: #fff;
}

.btn-reorder {
  background: var(--bg);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-reorder:hover {
  background: var(--border);
  color: var(--text);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state i {
  font-size: 56px;
  margin-bottom: 16px;
  color: var(--border);
}

.empty-state h3 {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.empty-state p {
  font-size: 0.9rem;
}

.empty-state a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  padding: 20px;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 700px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-xl);
  border: 1px solid var(--border);
  animation: slideUp 0.3s ease;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.modal-header h2 {
  font-size: 1.2rem;
  font-weight: 700;
}

.modal-close {
  background: var(--bg);
  border: none;
  border-radius: 8px;
  width: 36px;
  height: 36px;
  cursor: pointer;
  font-size: 16px;
  color: var(--text-secondary);
  transition: var(--transition);
}

.modal-close:hover {
  background: #fee2e2;
  color: #ef4444;
}

.tracking-box {
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  color: white;
  padding: 20px;
  border-radius: var(--radius-sm);
  text-align: center;
  margin-bottom: 24px;
}

.tracking-box .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.8;
  margin-bottom: 6px;
}

.tracking-box .number {
  font-size: 20px;
  font-weight: 700;
  font-family: monospace;
  letter-spacing: 2px;
}

.order-item {
  display: flex;
  gap: 14px;
  padding: 14px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  align-items: center;
}

.order-item img {
  width: 64px;
  height: 64px;
  object-fit: cover;
  border-radius: 8px;
  background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
}

.order-item-info { flex: 1; }
.order-item-name { font-weight: 600; font-size: 0.95rem; }
.order-item-meta { font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px; }
.order-item-price { color: var(--primary); font-weight: 700; font-size: 0.9rem; margin-top: 4px; }

.timeline { margin-top: 20px; }
.timeline-item {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-left: 3px solid var(--border);
  padding-left: 20px;
  position: relative;
}
.timeline-item.completed { border-left-color: var(--primary); }
.timeline-dot {
  position: absolute;
  left: -7px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--border);
}
.timeline-item.completed .timeline-dot { background: var(--primary); }
.timeline-title { font-weight: 600; font-size: 0.95rem; }
.timeline-date { color: var(--text-secondary); font-size: 0.85rem; }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--text);
  color: #fff;
  padding: 14px 22px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 500;
  box-shadow: var(--shadow-xl);
  display: flex;
  align-items: center;
  gap: 10px;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 9999;
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

.toast i { font-size: 18px; }
.toast.success i { color: #4ade80; }
.toast.error i { color: #ef4444; }

/* ===== SKELETON ===== */
.skeleton {
  background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

@keyframes fadeIn {
  0% { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ===== NAVBAR MOBILE ===== */
@media (max-width: 768px) {
  .nav-links {
    position: fixed;
    top: 64px;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(16px);
    flex-direction: column;
    align-items: stretch;
    padding: 12px 20px 20px;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    transform: translateY(-150%);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }

  .nav-links.open {
    transform: translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  .nav-link {
    padding: 12px 14px;
    border-radius: 10px;
    justify-content: flex-start;
  }

  .nav-mobile-toggle {
    display: none;
  }

  .nav-profile {
    gap: 8px;
  }

  .main-container {
    grid-template-columns: 1fr;
  }

  .profile-card {
    position: relative;
    top: 0;
    max-width:63%;
  }

  .orders-table-wrap {
    font-size: 0.85rem;
    overflow-x: scroll;
  }
#orders-container{
  overflow-x: scroll;
}
.orders-section{
  max-width:63%;
}
  .product-cell-name {
    max-width: 120px;
  }

  .action-cell {
    flex-direction: column;
    gap: 6px;
  }

  .btn-action {
    width: 100%;
    justify-content: center;
  }
}
</style>

<body>

<div id="navbar"></div>

<!-- Page Header -->
<div class="page-header">
  <h1>Mon Compte</h1>
  <p>Gérez votre profil et suivez vos commandes.</p>
</div>

<!-- Main -->
<div class="main-container">
  <!-- Profile -->
  <div class="profile-card">
    <div class="profile-avatar" id="profile-avatar">U</div>
    <div class="profile-name" id="profile-name">Loading...</div>
    <div class="profile-email" id="profile-email">Loading...</div>

    <!-- View Mode -->
    <div id="profile-view" style="display:block;">

      <div class="profile-info-list">
        <div class="profile-info-item">
          <i class="fas fa-phone"></i>
          <span>Phone</span>
          <strong id="profile-phone">—</strong>
        </div>
        <div class="profile-info-item">
          <i class="fas fa-calendar"></i>
          <span>Relié</span>
          <strong id="profile-joined">—</strong>
        </div>
      </div>
      <button class="btn btn-primary" onclick="toggleEdit()">
        <i class="fas fa-edit"></i> Modifier
      </button>
    </div>

    <!-- Edit Mode -->
    <div id="profile-edit" class="edit-form">
      <div class="form-group">
        <label>Nom et prénom</label>
        <input type="text" id="edit-name" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Numéro de téléphone</label>
        <input type="tel" id="edit-phone" placeholder="Your phone number">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveProfile()">
          <i class="fas fa-save"></i> Sauvegarder
        </button>
        <button class="btn btn-secondary" onclick="toggleEdit()">
          Annuler
        </button>
      </div>
    </div>
  </div>

  <!-- Orders -->
  <div class="orders-section">
    <div class="orders-header">
      <h2><i class="fas fa-receipt"></i> Historique des commandes</h2>
      <span class="order-count" id="order-count">0 article</span>
    </div>
    <div id="orders-container">
      <div class="skeleton" style="height: 200px;"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="order-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2><i class="fas fa-box-open"></i> Order #<span id="modal-order-id"></span></h2>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast">
  <i class="fas fa-check-circle"></i>
  <span id="toast-message">Updated</span>
</div>

<!-- Scripts -->

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  const firebaseConfig = {

    if (!user) {
